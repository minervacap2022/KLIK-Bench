name: "KLIK-Bench"
version: "0.2.0"
description: "Benchmark for evaluating AI meeting agents on cross-platform task execution, memory grounding, preference adherence, execution boundary recognition, and multi-step orchestration"
created: "2026-03-12"
updated: "2026-03-19"

structure:
  personas_dir: "personas/"
  tasks_dir: "tasks/"
  persona_count: 8
  task_count: 50

