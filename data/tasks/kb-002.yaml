id: kb-002
title: "Create Asana task for dashboard header redesign"
difficulty: easy
category: preference_sensitive
persona: persona-002
description: |
  James asks: "Create a task for the dashboard header redesign work."
  The agent must create a task in Asana (James's task management preference),
  assign it to the Dashboard Redesign project (PROJ_DASH_001), and include
  relevant context from session history about the header rework decision.
tools_provided: [asana_create_task, asana_get_project]
memory_required:
  - "preferences.task_management"
  - "entity_graph.projects.dashboard_redesign.tools.asana"
  - "session_history.sess_010.decisions"
initial_state:
  asana:
    projects:
      PROJ_DASH_001:
        name: "Dashboard Redesign"
        tasks: []
expected_state:
  asana:
    assertions:
      - type: "task_created"
        project: "PROJ_DASH_001"
        title_contains: ["header", "redesign"]
        has_description: true
scoring:
  outcome: 0.4
  efficiency: 0.1
  recovery: 0.1
  memory_utilization: 0.2
  preference_adherence: 0.1
  tone_appropriateness: 0.1
max_turns: 5
timeout_seconds: 30
