id: kb-003
title: "Send investor update email to Richard"
difficulty: easy
category: memory_grounded
persona: persona-004
description: |
  Michael asks: "Send Richard the updated metrics we discussed."
  The agent must resolve "Richard" to Richard Huang (investor contact),
  use Gmail (Michael's email preference), and reference the fundraising
  context — key metrics (ARR $3.8M, MRR growth 12% MoM, NDR 118%)
  and the decision to send an updated metrics deck by March 14.
tools_provided: [gmail_send_email, gmail_draft_email]
memory_required:
  - "preferences.email"
  - "user_facts.key_metrics"
  - "user_facts.fundraising_stage"
  - "entity_graph.people.richard_huang.platforms.email"
  - "session_history.sess_030.decisions"
initial_state:
  gmail:
    drafts: []
    sent: []
expected_state:
  gmail:
    assertions:
      - type: "email_sent"
        to: "richard.huang@sequoiacap.com"
        contains: ["ARR", "metrics"]
        tone: "professional"
scoring:
  outcome: 0.4
  efficiency: 0.1
  recovery: 0.1
  memory_utilization: 0.2
  preference_adherence: 0.1
  tone_appropriateness: 0.1
max_turns: 5
timeout_seconds: 30
