    users:
      - id: "jennifer.walsh@healthfirst.org"
        name: "Jennifer Walsh"
    messages: []
  outlook:
    calendar: []

expected_state:
  teams:
    messages:
      - channel_type: "dm"
        to_user: "jennifer.walsh@healthfirst.org"
        tone_requirements:
